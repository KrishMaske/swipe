name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check import health
        run: python -c "import app; print('App imports OK')"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SUPABASE_JWK: ${{ secrets.SUPABASE_JWK }}

  migrations:
    name: SQL Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SQL files exist
        run: |
          echo "Checking SQL files..."
          for f in backend/database/*.sql; do
            echo "✓ $f"
          done

  mobile:
    name: Mobile (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true