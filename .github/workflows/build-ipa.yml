name: iOS Build (Sideloading)

on:
  workflow_dispatch:
  push:
    branches: [ ipa ]

jobs:
  ios-build:
    name: iOS Build (Sideloading)
    runs-on: macos-15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        working-directory: mobile
        env:
          HUSKY: 0
        run: npm install

      - name: "Diagnostic: Check Secret Presence"
        run: |
          echo "Checking if secrets are available to the runner (by checking multiple possible names)..."
          check_secret() {
            if [ -n "$1" ]; then echo "✓ $2 is set"; else echo "✗ $2 is MISSING"; fi
          }
          check_secret "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}${{ secrets.SUPABASE_URL }}" "SUPABASE_URL (any form)"
          check_secret "${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}${{ secrets.SUPABASE_KEY }}${{ secrets.SUPABASE_ANON_KEY }}" "SUPABASE_ANON_KEY (any form)"
          check_secret "${{ secrets.EXPO_PUBLIC_API_URL }}${{ secrets.API_URL }}" "API_URL (any form)"

      - name: Create .env file
        working-directory: mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL || secrets.API_URL }}" >> .env

      - name: Expo prebuild (generate native iOS project)
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || secrets.API_URL }}
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for Swift 6
        working-directory: mobile/ios
        run: |
          echo "Forcing Swift 6 for all targets in Podfile..."
          printf "\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['SWIFT_VERSION'] = '6.0'\n    end\n  end\nend\n" >> Podfile

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Identify workspace and scheme
        id: xcode_info
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace found in mobile/ios" >&2
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: $WORKSPACE"
          echo "Scheme:    $SCHEME"

      - name: Auto-increment build number
        run: |
          INFO_PLIST="mobile/ios/${{ steps.xcode_info.outputs.scheme }}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$INFO_PLIST"
          echo "Build number set to ${{ github.run_number }}"

      - name: Restore Xcode build cache
        uses: irgaly/xcode-cache@v1.9.2
        with:
          key: ios-xcode-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}
          restore-keys: ios-xcode-
          deriveddata-directory: ${{ github.workspace }}/build

      - name: Build with xcodebuild
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace "${{ steps.xcode_info.outputs.workspace }}" \
            -scheme "${{ steps.xcode_info.outputs.scheme }}"

          xcodebuild build \
            -workspace "${{ steps.xcode_info.outputs.workspace }}" \
            -scheme "${{ steps.xcode_info.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            SWIFT_VERSION=6.0 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package app as IPA
        run: |
          SCHEME="${{ steps.xcode_info.outputs.scheme }}"
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in build/Build/Products/Release-iphoneos" >&2
            exit 1
          fi
          
          # Apply ad-hoc signature for sideloading tool compatibility
          echo "Applying ad-hoc signature..."
          codesign -s - -f --deep "$APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "${SCHEME}.ipa" Payload/
          echo "Created ${SCHEME}.ipa"

      - name: Prepare release metadata
        id: release_info
        run: |
          TAG="ios-build-${{ github.run_number }}"
          NAME="iOS Sideloading Build ${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.xcode_info.outputs.scheme }}-${{ github.run_number }}
          path: ${{ steps.xcode_info.outputs.scheme }}.ipa
          retention-days: 30

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_info.outputs.tag }}" "${{ steps.xcode_info.outputs.scheme }}.ipa" \
            --title "${{ steps.release_info.outputs.name }}" \
            --generate-notes \
            --prerelease