name: iOS Build (Sideloading)

on:
  workflow_dispatch:
  push:
    branches: [ ipa ]

jobs:
  ios-build:
    name: iOS Build (Sideloading)
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install Node dependencies
        working-directory: mobile
        run: npm install

      - name: Validate required environment variables
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          MISSING=0
          for VAR_NAME in EXPO_PUBLIC_SUPABASE_URL EXPO_PUBLIC_SUPABASE_ANON_KEY EXPO_PUBLIC_API_URL; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error::Missing required GitHub secret: ${VAR_NAME}"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "One or more required variables are missing."
            exit 1
          fi

      - name: Create .env file
        working-directory: mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env

      - name: Restore prebuild cache
        id: prebuild-cache
        uses: actions/cache/restore@v4
        with:
          path: mobile/ios
          key: ios-prebuild-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}
          restore-keys: ios-prebuild-

      - name: Expo prebuild
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform ios --clean

      - name: Save prebuild cache
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: mobile/ios
          key: ios-prebuild-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}

      - name: Identify workspace and scheme
        id: xcode_info
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace found in mobile/ios" >&2
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: $WORKSPACE"
          echo "Scheme:    $SCHEME"

      - name: Auto-increment build number
        run: |
          INFO_PLIST="mobile/ios/${{ steps.xcode_info.outputs.scheme }}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$INFO_PLIST"
          echo "Build number set to ${{ github.run_number }}"

      - name: Restore Xcode build cache
        uses: irgaly/xcode-cache@v1.9.2
        with:
          key: ios-xcode-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}
          restore-keys: ios-xcode-
          deriveddata-directory: ${{ github.workspace }}/build

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -workspace "${{ steps.xcode_info.outputs.workspace }}" \
            -scheme "${{ steps.xcode_info.outputs.scheme }}"

          xcodebuild \
            -workspace "${{ steps.xcode_info.outputs.workspace }}" \
            -scheme "${{ steps.xcode_info.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package app as IPA
        run: |
          SCHEME="${{ steps.xcode_info.outputs.scheme }}"
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found" >&2
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "${SCHEME}.ipa" Payload/
          echo "Created ${SCHEME}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwipeSmart-${{ github.run_number }}
          path: ${{ steps.xcode_info.outputs.scheme }}.ipa
          retention-days: 30

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ios-build-${{ github.run_number }}" "${{ steps.xcode_info.outputs.scheme }}.ipa" \
            --title "iOS Sideloading Build ${{ github.run_number }}" \
            --generate-notes \
            --prerelease