name: iOS Build (Sideloading)

on:
  workflow_dispatch:
  push:
    branches: [ ipa ]

jobs:
  ios-build:
    name: iOS Build (Sideloading)
    runs-on: macos-15  # Using macOS 15 (Sequoia) for Xcode 16
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        working-directory: mobile
        run: npm install  # More resilient than npm ci in some environments

      - name: "Diagnostic: Check Secret Presence"
        run: |
          echo "Checking if secrets are available to the runner (by checking multiple possible names)..."
          check_secret() {
            if [ -n "$1" ]; then echo "✓ $2 is set"; else echo "✗ $2 is MISSING"; fi
          }
          check_secret "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}${{ secrets.SUPABASE_URL }}" "SUPABASE_URL (any form)"
          check_secret "${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}${{ secrets.SUPABASE_KEY }}${{ secrets.SUPABASE_ANON_KEY }}" "SUPABASE_ANON_KEY (any form)"
          check_secret "${{ secrets.EXPO_PUBLIC_API_URL }}${{ secrets.API_URL }}" "API_URL (any form)"

      - name: Validate required Expo environment variables
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || secrets.API_URL }}
        run: |
          MISSING=0
          for VAR_NAME in EXPO_PUBLIC_SUPABASE_URL EXPO_PUBLIC_SUPABASE_ANON_KEY EXPO_PUBLIC_API_URL; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error::Missing required GitHub secret: ${VAR_NAME}"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "One or more required EXPO_PUBLIC variables are missing."
            exit 1
          fi

      - name: Expo prebuild (generate native iOS project)
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || secrets.API_URL }}
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for Swift 5.10
        working-directory: mobile/ios
        run: |
          echo "Creating Ruby patch script..."
          cat <<EOF > patch_podfile.rb
          content = File.read('Podfile')
          # Inject Swift 5.10 setting into the existing post_install block
          # We insert it right after the block start
          # Swift 5.10 is more compatible with current Expo modules than 6.0
          patched = content.gsub(/post_install do \|installer\|/, "post_install do |installer|\n  installer.pods_project.targets.each { |t| t.build_configurations.each { |c| c.build_settings['SWIFT_VERSION'] = '5.10' } }")
          File.write('Podfile', patched)
          EOF
          echo "Applying Ruby patch..."
          ruby patch_podfile.rb
          echo "Podfile patched successfully."

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Identify workspace and scheme
        id: xcode_info
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace found in mobile/ios" >&2
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: $WORKSPACE"
          echo "Scheme:    $SCHEME"

      - name: Auto-increment build number
        run: |
          INFO_PLIST="mobile/ios/${{ steps.xcode_info.outputs.scheme }}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$INFO_PLIST"
          echo "Build number set to ${{ github.run_number }}"

      - name: Build with xcodebuild (Debug, no code signing)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || secrets.API_URL }}
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -workspace "${{ steps.xcode_info.outputs.workspace }}" \
            -scheme "${{ steps.xcode_info.outputs.scheme }}"
          
          xcodebuild \
            -workspace "${{ steps.xcode_info.outputs.workspace }}" \
            -scheme "${{ steps.xcode_info.outputs.scheme }}" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SWIFT_VERSION=5.10 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO

      - name: Package app as IPA
        run: |
          SCHEME="${{ steps.xcode_info.outputs.scheme }}"
          APP_PATH=$(find build/Build/Products/Debug-iphoneos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in build/Build/Products/Debug-iphoneos" >&2
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "${SCHEME}.ipa" Payload/
          echo "Created ${SCHEME}.ipa"

      - name: Prepare release metadata
        id: release_info
        run: |
          TAG="ios-build-${{ github.run_number }}"
          NAME="iOS Sideloading Build ${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.xcode_info.outputs.scheme }}-${{ github.run_number }}
          path: ${{ steps.xcode_info.outputs.scheme }}.ipa
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          generate_release_notes: true
          prerelease: true
          files: ${{ steps.xcode_info.outputs.scheme }}.ipa
          token: ${{ secrets.GITHUB_TOKEN }}